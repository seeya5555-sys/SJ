{% extends 'base.html' %}
{% block title %}출장 경비 · TRMT1{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">출장 경비</h1>
  <div class="page-actions">
    <button id="btn-new-trip" class="btn btn-primary">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      신규 출장
    </button>
  </div>
</div>

<div class="toolbar">
  <input type="text" class="input" id="exp-search" placeholder="출장명 검색..." style="flex:1;max-width:360px;">
  <select class="select" id="exp-filter-status">
    <option value="">All Status</option>
    <option value="open">진행 중</option>
    <option value="settled">정산완료</option>
  </select>
  <span class="count-label" id="exp-count-label"></span>
</div>

<div class="dd-grid" id="exp-grid">
  <div class="empty-state" id="exp-empty" hidden>
    <p>아직 등록된 출장이 없습니다. 우측 상단 "신규 출장"을 눌러 시작하세요.</p>
  </div>
</div>

<!-- 신규/편집 모달 -->
<div class="modal" id="exp-modal" hidden>
  <div class="modal-backdrop" data-close="1"></div>
  <div class="modal-box modal-lg">
    <div class="modal-head">
      <h2 id="exp-modal-title">신규 출장</h2>
      <button class="modal-close" data-close="1" aria-label="닫기">&times;</button>
    </div>

    <form id="exp-form" class="modal-body">
      <div class="form-grid">
        <label class="form-row">
          <span class="form-label">출장명 <em class="req">*</em></span>
          <input type="text" id="exp-title" required placeholder="예) Zhoushan 입거 출장">
        </label>

        <div class="form-row form-row-2col">
          <label>
            <span class="form-label">기간 시작</span>
            <input type="date" id="exp-start">
          </label>
          <label>
            <span class="form-label">기간 종료</span>
            <input type="date" id="exp-end">
          </label>
        </div>

        <label class="form-row">
          <span class="form-label">정산 상태</span>
          <select id="exp-status">
            <option value="open">진행 중</option>
            <option value="settled">정산완료</option>
          </select>
        </label>

        <label class="form-row">
          <span class="form-label">법인카드 번호</span>
          <input type="text" id="exp-cards" placeholder="여러 개면 쉼표(,)로 구분 — 예) 1234, 5678">
          <span class="form-hint">영수증 입력 시 "법인카드" 결제건의 카드번호로 선택됩니다.</span>
        </label>
      </div>
    </form>

    <div class="modal-foot">
      <button type="button" class="btn btn-danger btn-outline" id="exp-btn-delete" hidden>삭제</button>
      <span class="flex-spacer"></span>
      <button type="button" class="btn btn-outline" data-close="1">취소</button>
      <button type="button" class="btn btn-primary" id="exp-btn-save">저장</button>
      <button type="button" class="btn btn-primary" id="exp-btn-save-open" hidden>저장 후 열기 ▶</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/exp.js') }}"></script>
{% endblock %}
