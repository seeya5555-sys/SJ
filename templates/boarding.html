{% extends 'base.html' %}
{% block title %}Boarding Report · TRMT1{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Boarding Report</h1>
  <div class="page-actions">
    <button id="brep-btn-new" class="btn btn-primary">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      신규 보고서
    </button>
  </div>
</div>

<div class="toolbar">
  <input type="text" class="input" id="brep-search" placeholder="제목, 항구 검색..." style="flex:1;max-width:360px;">
  <select class="select" id="brep-filter-vessel">
    <option value="">All 선박</option>
  </select>
  <select class="select" id="brep-filter-status">
    <option value="">All Status</option>
    <option value="draft">진행 중</option>
    <option value="done">완료</option>
  </select>
  <span class="count-label" id="brep-count-label"></span>
</div>

<div class="dd-grid" id="brep-grid">
  <div class="empty-state" id="brep-empty" hidden>
    <p>아직 작성된 보고서가 없습니다. 우측 상단 "신규 보고서"를 눌러 시작하세요.</p>
  </div>
</div>

<!-- 신규/편집 메타 모달 -->
<div class="modal" id="brep-modal" hidden>
  <div class="modal-backdrop" data-close="1"></div>
  <div class="modal-box modal-lg">
    <div class="modal-head">
      <h2 id="brep-modal-title">신규 보고서</h2>
      <button class="modal-close" data-close="1" aria-label="닫기">&times;</button>
    </div>

    <form id="brep-form" class="modal-body">
      <div class="form-grid">
        <label class="form-row">
          <span class="form-label">제목 <em class="req">*</em></span>
          <input type="text" id="brep-title" required
                 placeholder="예) MARITIME GLORY호 1차 정기 입거 방선보고서">
        </label>

        <div class="form-row form-row-2col">
          <label>
            <span class="form-label">선박 <em class="req">*</em></span>
            <select id="brep-vessel" required>
              <option value="">선박 선택...</option>
            </select>
          </label>
          <label>
            <span class="form-label">담당 감독</span>
            <select id="brep-supervisor">
              <option value="">미지정</option>
            </select>
          </label>
        </div>

        <label class="form-row">
          <span class="form-label">상태</span>
          <select id="brep-status">
            <option value="draft">진행 중</option>
            <option value="done">완료</option>
          </select>
        </label>

        <label class="form-row">
          <span class="form-label">방선 항구 (Port)</span>
          <input type="text" id="brep-port" placeholder="예) Zhoushan CIMC Changhong SY">
        </label>

        <div class="form-row form-row-2col">
          <label>
            <span class="form-label">방선 시작일</span>
            <input type="date" id="brep-period-start">
          </label>
          <label>
            <span class="form-label">방선 종료일</span>
            <input type="date" id="brep-period-end">
          </label>
        </div>

        <fieldset class="form-fieldset">
          <legend>본선 정보</legend>
          <div class="form-row form-row-2col">
            <label>
              <span class="form-label-sm">Master 이름</span>
              <input type="text" id="brep-master-name">
            </label>
            <label>
              <span class="form-label-sm">Master 승선일</span>
              <input type="date" id="brep-master-date">
            </label>
          </div>
          <div class="form-row form-row-2col" style="margin-top:10px;">
            <label>
              <span class="form-label-sm">C/E 이름</span>
              <input type="text" id="brep-ce-name">
            </label>
            <label>
              <span class="form-label-sm">C/E 승선일</span>
              <input type="date" id="brep-ce-date">
            </label>
          </div>
          <div class="form-row" style="margin-top:10px;">
            <label>
              <span class="form-label-sm">Ship-Visit Checklist Score</span>
              <input type="text" id="brep-checklist-score" placeholder="예) 85 / 100  또는  -">
            </label>
          </div>
        </fieldset>

        <fieldset class="form-fieldset">
          <legend>결재선 (Approval Line)</legend>
          <div class="form-row form-row-4col">
            <label>
              <span class="form-label-sm">기안자</span>
              <input type="text" id="brep-app-drafter">
            </label>
            <label>
              <span class="form-label-sm">팀장</span>
              <input type="text" id="brep-app-team">
            </label>
            <label>
              <span class="form-label-sm">중역</span>
              <input type="text" id="brep-app-director">
            </label>
            <label>
              <span class="form-label-sm">대표이사</span>
              <input type="text" id="brep-app-ceo">
            </label>
          </div>
        </fieldset>

        <label class="form-row form-row-inline">
          <input type="checkbox" id="brep-is-template">
          <span>이 보고서를 <strong>템플릿</strong>으로 저장</span>
        </label>

        <label class="form-row" id="brep-template-name-row" hidden>
          <span class="form-label">템플릿 이름</span>
          <input type="text" id="brep-template-name" placeholder="예) 표준 방선보고서">
        </label>
      </div>
    </form>

    <div class="modal-foot">
      <button type="button" class="btn btn-danger btn-outline" id="brep-btn-delete" hidden>삭제</button>
      <span class="flex-spacer"></span>
      <button type="button" class="btn btn-outline" data-close="1">취소</button>
      <button type="button" class="btn btn-primary" id="brep-btn-save">저장</button>
      <button type="button" class="btn btn-primary" id="brep-btn-save-edit" hidden>저장 후 본문 편집 ▶</button>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/brep.js') }}"></script>
{% endblock %}
