{% extends "base.html" %}
{% block title %}메일 처리 · TRMT3{% endblock %}
{% block head %}
<style>
  .mc-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .mc-count{color:var(--text-secondary);font-size:13px}
  .mc-list{display:flex;flex-direction:column;gap:22px;max-width:1040px}
  .mc-card{position:relative;border:1px solid var(--border);border-radius:13px;background:#fff;box-shadow:0 2px 5px rgba(15,23,42,.06),0 6px 18px rgba(15,23,42,.06);overflow:hidden;transition:box-shadow .15s,transform .15s}
  .mc-card:hover{box-shadow:0 4px 10px rgba(15,23,42,.10),0 12px 28px rgba(15,23,42,.09);transform:translateY(-1px)}
  /* 좌측 우선순위 컬러 바 — 카드 시작점 명확 + 우선순위 한눈에 */
  .mc-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--border-strong);z-index:2}
  .mc-card[data-prio="Urgent"]::before{background:var(--amber)}
  .mc-card[data-prio="COC & Flag"]::before{background:var(--red)}
  .mc-card[data-prio="Next DD"]::before{background:var(--blue)}
  .mc-card[data-prio="Normal"]::before{background:var(--text-tertiary)}
  .mc-card[data-done="1"]::before{background:var(--border)}
  .mc-card.busy{opacity:.55;pointer-events:none}
  .mc-top{display:flex;align-items:flex-start;gap:10px;padding:13px 16px 13px 18px;background:var(--surface-3);border-bottom:1px solid var(--border)}
  .mc-subj{font-weight:600;color:var(--text-primary)}
  .mc-meta{font-size:12px;color:var(--text-secondary);margin-top:3px}
  .mc-badges{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .bdg{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
  .b-i{background:var(--blue-bg);color:var(--blue)}.b-r{background:var(--green-bg);color:var(--green)}
  .b-info{background:var(--amber-bg);color:var(--amber)}.b-na{background:var(--surface-3);color:var(--text-tertiary)}.b-done{background:var(--surface-3);color:var(--text-secondary)}
  .b-pend{background:var(--amber-bg);color:var(--amber)}
  .mc-sum{background:var(--blue-bg);border-bottom:1px solid var(--blue-border);padding:9px 15px;font-size:13px;color:var(--blue-text)}
  /* 스레드 전체 1~2줄 요약 — 카드 맨 위, 항상 표시 */
  .mc-thread{background:var(--amber-bg);border-bottom:1px solid var(--amber-border);padding:8px 15px;font-size:12.5px;color:var(--amber);line-height:1.45}
  .mc-wiki{background:var(--purple-bg,#EEEDFE);border-bottom:1px solid #d7d3f5;padding:8px 15px;font-size:12px;color:var(--text-secondary);line-height:1.5}
  .mc-wiki .wk-h{font-weight:800;color:var(--purple,#534AB7)}
  .mc-wiki .wk-conf{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:999px;margin-left:4px}
  .mc-wiki .wk-high{background:var(--green-bg);color:var(--green)}
  .mc-wiki .wk-cand{background:var(--surface-3);color:var(--text-tertiary)}
  .mc-wiki a{color:var(--purple,#534AB7);font-weight:700;text-decoration:none}
  .mc-wiki .wk-chip{display:inline-block;font-size:10.5px;background:#fff;border:1px solid var(--border);border-radius:5px;padding:1px 6px;margin:2px 3px 0 0;color:var(--text-secondary)}
  /* 받은메일 원문/번역 — 접기/펼치기 (기본 접힘) */
  details.mc-mail{border-bottom:1px solid var(--surface-3)}
  details.mc-mail>summary{cursor:pointer;list-style:none;padding:9px 15px;font-size:12.5px;font-weight:600;color:var(--text-secondary);background:var(--surface-2);user-select:none}
  details.mc-mail>summary::-webkit-details-marker{display:none}
  details.mc-mail>summary::before{content:'▸ ';color:var(--text-tertiary)}
  details.mc-mail[open]>summary::before{content:'▾ '}
  .mc-mail-body{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;padding:11px 15px;background:var(--surface)}
  .mm-lbl{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;font-weight:700}
  .mm-en{font-size:12px;white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace;color:var(--text-secondary);line-height:1.5}
  .mm-ko{font-size:13px;white-space:pre-wrap;color:var(--text-primary);line-height:1.55}
  .mc-sec{padding:13px 15px;border-bottom:1px solid var(--surface-3)}.mc-sec:last-child{border-bottom:none}
  .mc-sh{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;margin-bottom:8px;color:var(--text-secondary)}
  /* 이슈/회신 섹션 — 접기/펼치기 (기본 접힘) */
  details.mc-secd{border-bottom:1px solid var(--surface-3)}
  details.mc-secd:last-of-type{border-bottom:none}
  details.mc-secd>summary{cursor:pointer;list-style:none;padding:11px 15px;font-weight:700;font-size:13px;color:var(--text-secondary);user-select:none;display:flex;align-items:center;gap:8px}
  details.mc-secd>summary::-webkit-details-marker{display:none}
  details.mc-secd>summary::before{content:'▸';color:var(--text-tertiary);font-size:12px;flex:none}
  details.mc-secd[open]>summary::before{content:'▾'}
  details.mc-secd[open]>summary{border-bottom:1px solid var(--border-subtle);background:var(--surface-2)}
  .mc-secd-hint{font-weight:400;font-size:12px;color:var(--text-tertiary);margin-left:auto;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mc-secd-body{padding:13px 15px}
  .fld{margin:6px 0;font-size:13px}.fld .k{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.03em}
  .box{border:1px solid var(--border-strong);border-radius:8px;padding:7px 9px;font-size:13px;font-family:inherit;width:100%}
  textarea.box{min-height:60px;resize:vertical;line-height:1.5}
  .row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:7px}
  .btn{border:1px solid var(--border);background:#fff;border-radius:8px;padding:5px 11px;font-size:12.5px;cursor:pointer;font-weight:600}
  .btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-g{background:var(--green);color:#fff;border-color:var(--green)}.btn-d{color:var(--red)}
  .en{background:var(--surface-2);border:1px dashed var(--border-strong);border-radius:8px;padding:9px 11px;font-size:12.5px;white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace;margin-top:7px;min-height:60px}
  .tip{font-size:11.5px;color:var(--text-tertiary);margin-top:4px}.err{color:var(--red);font-size:12.5px}
  .mc-empty{color:var(--text-tertiary);text-align:center;padding:40px 0}.flex-spacer{flex:1}.muted{color:var(--text-tertiary);font-weight:400;font-size:12px}
</style>
{% endblock %}
{% block content %}
<h1 class="page-title">📬 메일 처리 <span class="muted">(이슈 등록 + 회신 작성)</span></h1>
<div class="mc-head">
  <button class="btn btn-p btn-sm" id="mc-pull" type="button">📥 메일 지금 풀링</button>
  <button class="btn btn-sm" id="mc-tall" type="button">🌐 전체 번역</button>
  <div style="display:flex;gap:6px;margin-left:8px">
    <button class="btn btn-p btn-sm" data-f="active" type="button">처리중</button>
    <button class="btn btn-sm" data-f="pending" type="button">⏸ 보류</button>
    <button class="btn btn-sm" data-f="archived" type="button">📦 보관</button>
    <button class="btn btn-sm" data-f="all" type="button">전체</button>
  </div>
  <span class="mc-count" id="mc-count"></span>
  <span class="flex-spacer"></span>
  <button class="btn btn-sm" id="mc-delsel" type="button" style="color:var(--red)" disabled>🗑 선택삭제 (0)</button>
  <button class="btn btn-sm" id="mc-delall" type="button" style="color:var(--red)">🗑 전체삭제</button>
  <button class="btn btn-sm" id="mc-refresh" type="button">새로고침</button>
</div>
<div class="mc-list" id="mc-list"></div>
{% endblock %}
{% block scripts %}
<script>
(function(){
  const PRIO=['Normal','Urgent','COC & Flag','Next DD'];
  const listEl=document.getElementById('mc-list'),countEl=document.getElementById('mc-count');
  let filter='active';
  let ISSUES=[];  // 열린 Daily 현안 캐시 (기존 현안에 액션추가 셀렉터용)
  const OPEN=new Set();  // 사용자가 수동으로 펼친 섹션 키(`${cardId}:${sec}`) — 버튼 액션 후 재렌더 시 열림상태 복원용
  async function loadIssues(){
    // Open + InProgress 둘 다(진행중 현안도 액션추가 대상). 기존엔 Open만 떠서 진행중 누락됨.
    const [o,p]=await Promise.all([api('GET','/api/issues?status=Open'),api('GET','/api/issues?status=InProgress')]);
    const a=(o.ok&&Array.isArray(o.j))?o.j:[],b=(p.ok&&Array.isArray(p.j))?p.j:[];
    ISSUES=a.concat(b);
  }
  const esc=s=>(s==null?'':String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])));
  async function api(m,u,b){const o={method:m,headers:{'Accept':'application/json'}};if(b){o.headers['Content-Type']='application/json';o.body=JSON.stringify(b);}const r=await fetch(u,o);let j={};try{j=await r.json();}catch(e){}return{ok:r.ok,status:r.status,j};}

  async function load(){
    listEl.innerHTML='<div class="mc-empty">불러오는 중…</div>';
    const {ok,j}=await api('GET','/api/mail/cards?status='+filter);
    if(!ok){listEl.innerHTML='<div class="err" style="padding:20px">불러오기 실패</div>';return;}
    countEl.textContent='처리중 '+(j.active||0)+'건 · 보류 '+(j.pending||0)+'건'+(filter!=='active'?' · 표시 '+j.count:'');
    const emptyMsg={active:'처리할 메일 없음 👍',pending:'보류한 메일 없음',archived:'보관된 메일 없음'}[filter]||'없음';
    if(!j.cards.length){listEl.innerHTML='<div class="mc-empty">'+emptyMsg+'</div>';return;}
    await loadIssues();
    listEl.innerHTML='';j.cards.forEach(c=>listEl.appendChild(card(c)));
    updateSel();
  }

  function issueBadge(s){return {pending:'<span class="bdg b-i">이슈감</span>',registered:'<span class="bdg b-done">이슈 등록됨</span>',rejected:'<span class="bdg b-na">이슈 리젝</span>',not_applicable:'<span class="bdg b-na">이슈 해당없음</span>'}[s]||'';}
  function replyBadge(s){return {none:'',needs_info:'<span class="bdg b-info">회신 지시대기</span>',translated:'<span class="bdg b-r">번역됨</span>',draft_requested:'<span class="bdg b-info">Draft 대기</span>',draft_created:'<span class="bdg b-done">회신 Draft 생성됨</span>',dismissed:'<span class="bdg b-na">회신 안함</span>'}[s]||'';}

  function wikiBand(w){
    if(!w)return'';
    const conf=w.confidence==='high'
      ?'<span class="wk-conf wk-high">매칭 高</span>'
      :'<span class="wk-conf wk-cand">후보</span>';
    const basis=(w.basis||[]).map(b=>`<span class="wk-chip">${esc(b)}</span>`).join('');
    const daily=w.issue_id
      ?`<a href="/?issue=${w.issue_id}" title="${esc(w.issue_topic||'')}">🔗 Daily issue:${w.issue_id}</a>`
      :'<span class="tip">Daily 미연동</span>';
    const meta=[w.msg_count?`누적 ${w.msg_count}건`:'',w.category||'',w.date_last?`최근 ${esc(w.date_last)}`:'']
      .filter(Boolean).join(' · ');
    return `<div class="mc-wiki"><span class="wk-h">📚 위키</span> ${conf}
      <b>${esc(w.title||'(제목없음)')}</b>
      <div style="margin-top:2px">${esc(meta)}</div>
      ${w.evidence?`<div style="margin-top:2px;color:var(--text-tertiary)">${esc(w.evidence)}</div>`:''}
      <div style="margin-top:4px">${basis} · ${daily} · <a href="/shipwiki?ship=${encodeURIComponent(w.slug||'')}">위키 열기</a></div></div>`;
  }
  function card(c){
    const el=document.createElement('div');el.className='mc-card';el.dataset.id=c.id;
    el.dataset.prio=c.issue_priority||'Normal';
    if(c.issue_status&&c.issue_status!=='pending')el.dataset.done='1';
    // 이슈 섹션
    let issueHtml;
    if(c.issue_status==='pending'){
      const opts=PRIO.map(p=>`<option${p===c.issue_priority?' selected':''}>${esc(p)}</option>`).join('');
      const appendBtn=c.issue_match_id?`<button class="btn btn-sm act-iappend">＋ issue:${c.issue_match_id}에 액션추가</button>`:'';
      issueHtml=`<div class="row"><div class="fld" style="flex:1;min-width:160px"><span class="k">선박</span><input class="box i-ves" value="${esc(c.issue_vessel||'')}" placeholder="vessel"></div>
        <div class="fld" style="flex:1;min-width:140px"><span class="k">담당감독</span><input class="box i-sup" value="${esc(c.issue_supervisor||'')}" placeholder="비우면 본인"></div>
        <div class="fld" style="max-width:140px"><span class="k">Priority</span><select class="box i-prio">${opts}</select></div></div>
        <div class="fld"><span class="k">Item</span><input class="box i-item" value="${esc(c.issue_item||'')}"></div>
        <div class="fld"><span class="k">Description</span><textarea class="box i-desc">${esc(c.issue_desc||'')}</textarea>
          ${c.wiki?`<div style="margin-top:4px"><button class="btn btn-sm act-wikidraft" title="위키 최신 전개로 진행내역 초안(저장 전 화면뿐, 편집 가능)">📚 위키 초안 채우기</button> <span class="tip">${c.wiki.confidence==='high'?'매칭 高':'후보'} · 저장해야 Daily 반영</span></div>`:''}</div>
        <div class="row" style="align-items:center;flex-wrap:wrap;gap:6px"><span class="k" style="flex:none">기존 현안에 추가</span>
          <label class="tip" style="flex:none;cursor:pointer"><input type="checkbox" class="i-vfilter" checked style="vertical-align:middle"> 선명만</label>
          <select class="box i-existing" style="flex:1;min-width:220px"></select>
          <button class="btn btn-sm act-iappend2">＋ 선택 현안에 액션추가</button></div>
        <div class="row"><button class="btn btn-p btn-sm act-ireg">✅ Daily업무 등록</button>${appendBtn}
          <button class="btn btn-sm act-ina">해당없음</button><button class="btn btn-d btn-sm act-irej">리젝</button></div>`;
    }else{
      issueHtml=`<div class="muted">${esc(c.issue_status)}${c.issue_id?` → issue:${c.issue_id}`:''}${c.reject_reason?(' · '+esc(c.reject_reason)):''}</div>`;
    }
    // 회신 섹션
    const replyOpen=!(c.reply_status==='draft_created'||c.reply_status==='dismissed');
    let replyHtml;
    if(replyOpen){
      const enBlock=(c.reply_status==='translated'||c.reply_status==='draft_requested')?
        `<div class="fld" style="margin-top:7px"><span class="k">영문 (편집 가능) — 확인 후 Outlook Draft</span><textarea class="box r-en" style="min-height:120px;font-family:ui-monospace,Menlo,monospace">${esc(c.reply_en||'')}</textarea></div>
         <div class="row"><button class="btn btn-g btn-sm act-rdraft">✉️ 이 영문으로 Outlook Draft 생성</button><span class="tip">+서명 자동첨부 · 원메일에 reply · 자동발송 없음</span></div>`:'';
      const aorLane=(c.aor&&c.aor.level&&c.aor.level!=='not_aor')?
        `<div class="mc-wiki" style="background:#fff7ed;border-color:var(--amber-border);margin-bottom:8px">
           <span class="wk-h" style="color:var(--amber)">🛠 AOR 승인요청 감지</span>
           <span class="wk-conf ${c.aor.level==='aor_request'?'wk-high':'wk-cand'}">${c.aor.level==='aor_request'?'승인요청':'가능성'}</span>
           <button class="btn btn-sm act-aor" style="margin-left:6px">⚡ 승인/추가검증 옵션 생성</button>
           <span class="tip">딸깍 — 둘 다 draft·사람 Send·자동발송 0</span>
           <div class="aor-box" style="margin-top:7px"></div></div>`:'';
      replyHtml=aorLane+`<div class="fld"><span class="k">회신 지시 (한글 — 무엇을 답할지)</span><textarea class="box r-ko" placeholder="예: Giorgos에게. ... 회신 요청.">${esc(c.reply_ko||'')}</textarea>
          <div class="tip">한글 지시 = 내용 정답. Gemini가 네 스타일로 영문 번역만(추측X).</div></div>
        <div class="row"><span class="k">스타일</span><select class="box r-style" style="max-width:120px"><option>간결직설</option><option>정중</option><option>강경</option></select>
          <input class="box r-memo" placeholder="추가 메모(예: 기한 강조)" style="flex:1;min-width:120px">
          <button class="btn btn-p btn-sm act-rtrans">🌐 번역(Gemini)</button>
          <button class="btn btn-sm act-rdismiss" style="margin-left:auto">회신 안함</button></div>
        <span class="err act-rerr" hidden></span>${enBlock}`;
    }else{
      replyHtml=`<div class="muted">${esc(c.reply_status)}${c.reply_status==='draft_created'?' · Outlook Drafts 확인 → 최종 Send':''}</div>`;
    }
    const issHint=c.issue_status==='pending'?(c.issue_item||''):'';
    const repHint=(c.reply_ko||'').trim().slice(0,40);
    const op=s=>OPEN.has(c.id+':'+s)?' open':'';  // 직전에 펼쳐둔 섹션만 open 복원
    el.innerHTML=`<div class="mc-top"><input type="checkbox" class="mc-pick" title="선택" style="margin-top:3px;width:16px;height:16px;flex:none;cursor:pointer">
      <div><div class="mc-subj">${esc(c.email_subject||'(제목없음)')}</div>
        <div class="mc-meta">${esc(c.email_from||'?')} · ${esc(c.email_date||'')} · #${c.id}</div></div>
      <div class="mc-badges">${c.pending?'<span class="bdg b-pend">⏸ 보류</span>':''}${issueBadge(c.issue_status)}${replyBadge(c.reply_status)}</div></div>
      ${c.thread_summary_ko?`<div class="mc-thread">🧵 <b>요약</b> · ${esc(c.thread_summary_ko)}</div>`:''}
      ${wikiBand(c.wiki)}
      ${(c.body_en||c.summary_ko)?`<details class="mc-mail" data-sec="mail"${op('mail')}><summary>📨 받은메일 원문 / 한글 번역</summary>
        <div class="mc-mail-body">
          ${c.body_en?`<div><div class="mm-lbl">원문 (English)</div><div class="mm-en">${esc(c.body_en)}</div></div>`:''}
          ${c.summary_ko?`<div><div class="mm-lbl">한국어 번역</div><div class="mm-ko">${esc(c.summary_ko)}</div></div>`:''}
        </div></details>`:''}
      <details class="mc-secd" data-sec="issue"${op('issue')}><summary>📋 TRMT 이슈${issHint?`<span class="mc-secd-hint">${esc(issHint)}</span>`:''}</summary><div class="mc-secd-body">${issueHtml}</div></details>
      <details class="mc-secd" data-sec="reply"${op('reply')}><summary>✉️ 회신 작성${repHint?`<span class="mc-secd-hint">${esc(repHint)}</span>`:''}</summary><div class="mc-secd-body">${replyHtml}</div></details>
      <div class="mc-sec" style="padding:8px 15px;display:flex;gap:6px;align-items:center">
        ${c.pending?'<button class="btn btn-sm act-punp">▶ 처리중으로</button>':'<button class="btn btn-sm act-pend">⏸ 보류</button>'}
        <span class="flex-spacer"></span>
        <button class="btn btn-sm act-arch">📦 archive</button>
        <button class="btn btn-sm act-del" style="color:#A32D2D">🗑 삭제</button></div>`;
    wire(el,c);return el;
  }

  // 기존 현안 셀렉터 채우기: 선명 필터(체크 시 카드 선박만), 미체크 시 전체 열린 현안
  function fillExisting(el){
    const sel=el.querySelector('.i-existing');if(!sel)return;
    const onlyV=el.querySelector('.i-vfilter')?.checked;
    const ves=((el.querySelector('.i-ves')||{}).value||'').trim().toLowerCase();
    let list=ISSUES.slice();
    if(onlyV&&ves){
      list=list.filter(it=>{const a=(it.vessel_name||'').toLowerCase(),b=(it.vessel_short||'').toLowerCase();
        return (a&&(a.includes(ves)||ves.includes(a)))||(b&&(b.includes(ves)||ves.includes(b)));});
    }
    if(!list.length){sel.innerHTML='<option value="">'+(onlyV&&ves?'(해당 선박 열린 현안 없음 — 선명만 해제)':'(열린 현안 없음)')+'</option>';return;}
    sel.innerHTML='<option value="">현안 선택…</option>'+list.map(it=>
      `<option value="${it.id}">#${it.id} [${esc(it.vessel_short||it.vessel_name||'')}] ${esc(it.item_topic||'')} (${esc(it.issue_date||'')})</option>`).join('');
  }

  function gv(el,s){const n=el.querySelector(s);return n?n.value.trim():undefined;}
  function busy(el,b){el.classList.toggle('busy',b);}
  // 액션 후 새로고침: 클릭한 카드를 같은 화면 위치에 고정(앵커). 카드가 사라지면(archive/삭제) 스크롤 위치만 보존 → 맨 위로 안 튐.
  async function reload(keepId){
    const prev=keepId!=null?listEl.querySelector('.mc-card[data-id="'+keepId+'"]'):null;
    const off=prev?prev.getBoundingClientRect().top:null;
    const y=window.scrollY;
    await load();
    requestAnimationFrame(()=>{
      if(keepId!=null&&off!=null){
        const now=listEl.querySelector('.mc-card[data-id="'+keepId+'"]');
        if(now){window.scrollTo(0,window.scrollY+now.getBoundingClientRect().top-off);return;}
      }
      window.scrollTo(0,y);
    });
  }
  function wire(el,c){
    const q=s=>el.querySelector(s);
    // 섹션 펼침/접힘을 OPEN에 기록 → 다음 재렌더 때 op()가 복원. 직접 토글한 것만 추적.
    el.querySelectorAll('details[data-sec]').forEach(d=>{
      d.addEventListener('toggle',()=>{const k=c.id+':'+d.dataset.sec;d.open?OPEN.add(k):OPEN.delete(k);});
    });
    const _wtid=(c.wiki&&c.wiki.thread_id)||undefined;
    if(q('.act-wikidraft'))q('.act-wikidraft').onclick=()=>{
      const w=c.wiki||{};
      const line=(c.thread_summary_ko||w.evidence||c.issue_item||'').trim();
      const di=q('.i-desc');if(di){di.value=line;di.focus();}
    };
    if(q('.act-ireg'))q('.act-ireg').onclick=async()=>{busy(el,1);const r=await api('POST',`/api/mail/${c.id}/issue/register`,{mode:'new',item:gv(el,'.i-item'),desc:gv(el,'.i-desc'),vessel:gv(el,'.i-ves'),supervisor:gv(el,'.i-sup'),priority:gv(el,'.i-prio'),wiki_thread_id:_wtid});if(!r.ok){alert('등록 실패: '+(r.j.hint||r.j.error));busy(el,0);}else reload(c.id);};
    if(q('.act-iappend'))q('.act-iappend').onclick=async()=>{busy(el,1);const r=await api('POST',`/api/mail/${c.id}/issue/register`,{mode:'append',desc:gv(el,'.i-desc'),wiki_thread_id:_wtid});if(!r.ok){alert('실패: '+(r.j.error));busy(el,0);}else reload(c.id);};
    if(q('.i-existing')){
      fillExisting(el);
      const vf=q('.i-vfilter');if(vf)vf.onchange=()=>fillExisting(el);
      const vi=q('.i-ves');if(vi)vi.addEventListener('input',()=>{const f=q('.i-vfilter');if(f&&f.checked)fillExisting(el);});
      q('.act-iappend2').onclick=async()=>{
        const mid=q('.i-existing').value;if(!mid){alert('추가할 현안을 선택하세요');return;}
        const desc=gv(el,'.i-desc');if(!desc){alert('Description(액션 내용)이 비어있습니다');return;}
        busy(el,1);const r=await api('POST',`/api/mail/${c.id}/issue/register`,{mode:'append',match_id:Number(mid),desc,wiki_thread_id:_wtid});
        if(!r.ok){alert('실패: '+(r.j.error));busy(el,0);}else reload(c.id);};
    }
    if(q('.act-irej'))q('.act-irej').onclick=async()=>{const rs=prompt('리젝 사유(선택):','');if(rs===null)return;busy(el,1);await api('POST',`/api/mail/${c.id}/issue/reject`,{reason:rs});reload(c.id);};
    if(q('.act-ina'))q('.act-ina').onclick=async()=>{busy(el,1);await api('POST',`/api/mail/${c.id}/issue/na`,{});reload(c.id);};
    if(q('.act-aor'))q('.act-aor').onclick=async(e)=>{
      const box=q('.aor-box');if(!box)return;const b=e.currentTarget;b.disabled=true;b.textContent='생성 중…';
      const r=await api('POST',`/api/mail/${c.id}/reply/aor-options`,{});
      b.disabled=false;b.textContent='⚡ 다시 생성';
      if(!r.ok||!r.j.is_aor){box.innerHTML='<span class="tip">AOR 승인요청 아님</span>';return;}
      const j=r.j;
      const optBox=(title,color,en,vio,blocked,reason,tmpl)=>{
        if(blocked)return `<div style="border:1px solid var(--border);border-radius:8px;padding:8px;margin-top:6px;opacity:.7">
          <b style="color:var(--text-tertiary)">${title}</b> <span class="tip">🔒 ${esc(reason||'')}</span></div>`;
        const warn=(vio&&vio.length)?`<div style="color:var(--red);font-size:11px;margin-top:3px">⚠️ fact 확인: ${esc(vio.join(', '))}</div>`:'';
        const tag=tmpl?'<span class="tip">코드 템플릿</span>':'<span class="tip">Gemini</span>';
        return `<div style="border:1px solid ${color};border-radius:8px;padding:8px;margin-top:6px">
          <b style="color:${color}">${title}</b> ${tag}
          <div style="white-space:pre-wrap;font-family:ui-monospace,monospace;font-size:11.5px;margin:4px 0;color:var(--text-secondary)">${esc(en||'(생성 실패)')}</div>
          ${warn}${en?`<button class="btn btn-g btn-sm act-aordraft" data-en="${esc(en)}">✉️ 이걸로 Outlook Draft</button>`:''}</div>`;
      };
      const ap=j.approve||{},cl=j.clarify||{};
      box.innerHTML=optBox('✅ 승인 (상신 진행)','var(--green)',ap.en,ap.violations,ap.blocked,ap.reason,ap.template)
        +optBox('↩︎ 추가검증 요청','var(--amber)',cl.en,cl.violations,false,'',false)
        +`<div class="tip" style="margin-top:5px">기본 선택 없음 · 빠진필드 ${(j.missing||[]).length?esc((j.missing||[]).join(', ')):'없음'} · 위키ver ${esc(j.wiki_version||'-')}</div>`;
      box.querySelectorAll('.act-aordraft').forEach(btn=>btn.onclick=async()=>{
        busy(el,1);const rr=await api('POST',`/api/mail/${c.id}/reply/draft-request`,{reply_en:btn.dataset.en});
        if(!rr.ok){alert('Draft 실패: '+(rr.j.error));busy(el,0);}else reload(c.id);});
    };
    if(q('.act-rtrans'))q('.act-rtrans').onclick=async()=>{const er=q('.act-rerr');er.hidden=true;const style=(gv(el,'.r-style')||'')+((gv(el,'.r-memo'))?(' / '+gv(el,'.r-memo')):'');busy(el,1);const r=await api('POST',`/api/mail/${c.id}/reply/translate`,{reply_ko:gv(el,'.r-ko'),reply_style:style});busy(el,0);if(!r.ok){er.textContent='번역 실패: '+(r.j.detail||r.j.error);er.hidden=false;}else reload(c.id);};
    if(q('.act-rdraft'))q('.act-rdraft').onclick=async()=>{busy(el,1);const r=await api('POST',`/api/mail/${c.id}/reply/draft-request`,{reply_en:gv(el,'.r-en')});if(!r.ok){alert('실패: '+(r.j.error));busy(el,0);}else reload(c.id);};
    if(q('.act-rdismiss'))q('.act-rdismiss').onclick=async()=>{busy(el,1);await api('POST',`/api/mail/${c.id}/reply/dismiss`,{});reload(c.id);};
    if(q('.act-pend'))q('.act-pend').onclick=async()=>{busy(el,1);await api('POST',`/api/mail/${c.id}/pending`,{});reload(c.id);};
    if(q('.act-punp'))q('.act-punp').onclick=async()=>{busy(el,1);await api('POST',`/api/mail/${c.id}/pending`,{off:true});reload(c.id);};
    if(q('.act-arch'))q('.act-arch').onclick=async()=>{busy(el,1);await api('POST',`/api/mail/${c.id}/archive`,{});reload(c.id);};
    if(q('.act-del'))q('.act-del').onclick=async()=>{if(!confirm('이 카드를 영구삭제할까요? (등록된 이슈는 유지, 카드만 삭제)'))return;busy(el,1);await api('POST',`/api/mail/${c.id}/delete`,{});reload(c.id);};
  }

  document.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{filter=b.dataset.f;document.querySelectorAll('[data-f]').forEach(x=>{x.classList.toggle('btn-p',x===b);});load();});
  document.getElementById('mc-refresh').onclick=load;
  document.getElementById('mc-delall').onclick=async()=>{
    const shown=listEl.querySelectorAll('.mc-card').length;
    if(!shown){alert('삭제할 카드 없음');return;}
    const label={active:'처리중',pending:'보류',archived:'보관',all:'전체'}[filter]||filter;
    if(!confirm('현재 보기('+label+') '+shown+'건 카드를 영구삭제합니다.\n등록된 이슈/업무는 그대로 유지됩니다. 계속?'))return;
    if(!confirm('정말 삭제할까요? 되돌릴 수 없습니다.'))return;
    const r=await api('POST','/api/mail/cards/delete-all',{scope:filter});
    if(!r.ok){alert('삭제 실패: '+((r.j&&(r.j.error))||r.status));return;}
    alert('삭제 '+(r.j.deleted||0)+'건 완료');load();
  };
  // 체크박스 다중선택 → 선택삭제
  const delSelBtn=document.getElementById('mc-delsel');
  function pickedIds(){return [...listEl.querySelectorAll('.mc-pick:checked')].map(cb=>cb.closest('.mc-card').dataset.id);}
  function updateSel(){const n=pickedIds().length;delSelBtn.textContent='🗑 선택삭제 ('+n+')';delSelBtn.disabled=n===0;}
  listEl.addEventListener('change',e=>{if(e.target.classList.contains('mc-pick'))updateSel();});
  delSelBtn.onclick=async()=>{
    const ids=pickedIds();
    if(!ids.length){alert('선택된 카드 없음');return;}
    if(!confirm('선택한 '+ids.length+'건 카드를 영구삭제합니다.\n등록된 이슈/업무는 그대로 유지됩니다. 계속?'))return;
    const r=await api('POST','/api/mail/cards/delete-selected',{ids});
    if(!r.ok){alert('삭제 실패: '+((r.j&&r.j.error)||r.status));return;}
    alert('삭제 '+(r.j.deleted||0)+'건 완료');load();
  };
  document.getElementById('mc-tall').onclick=async()=>{const b=document.getElementById('mc-tall');b.disabled=true;b.textContent='번역 중…';const r=await api('POST','/api/mail/translate-all',{});b.textContent='🌐 전체 번역';b.disabled=false;alert('번역 '+(r.j.translated||0)+'건'+(r.j.errors&&r.j.errors.length?(' / 실패 '+r.j.errors.length):''));load();};
  document.getElementById('mc-pull').onclick=async(e)=>{const b=e.currentTarget,o=b.textContent;b.disabled=true;b.textContent='요청 중…';const r=await api('POST','/api/wf/pull-now',{});b.textContent=r.ok?'✅ 요청됨':'✕ 실패';setTimeout(()=>{b.textContent=o;b.disabled=false;},4000);};
  load();
})();
</script>
{% endblock %}
